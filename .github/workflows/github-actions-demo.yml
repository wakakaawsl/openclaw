name: OpenClaw Image Builder
run-name: ${{ github.actor }} is building OpenClaw image 🐙
on: [push]
jobs:
  Build-OpenClaw-Image:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      
      - name: Check out repository code
        uses: actions/checkout@v5
      
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to install OpenClaw and build the image."
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install OpenClaw via npm directly
        run: |
          echo "⬇️ Installing OpenClaw using npm..."
          npm install -g openclaw
          echo "✅ OpenClaw installation completed"
      
      - name: Verify OpenClaw installation
        run: |
          export PATH="$HOME/.npm-global/bin:$PATH"
          echo "PATH: $PATH"
          echo "Checking openclaw installation..."
          which openclaw || echo "openclaw not in PATH"
          npm list -g --depth=0 | grep -i openclaw || echo "Not found in npm list"
      
      - name: Prepare Docker image context
        run: |
          echo "📁 Creating Docker image context..."
          mkdir -p openclaw-image
          
          # 使用 echo 逐行写入 Dockerfile，避免 heredoc 解析问题
          echo "FROM node:22-slim" > openclaw-image/Dockerfile
          echo "" >> openclaw-image/Dockerfile
          echo "# 安装系统依赖" >> openclaw-image/Dockerfile
          echo "RUN apt-get update && apt-get install -y --no-install-recommends \\" >> openclaw-image/Dockerfile
          echo "    ca-certificates \\" >> openclaw-image/Dockerfile
          echo "    git \\" >> openclaw-image/Dockerfile
          echo "    curl \\" >> openclaw-image/Dockerfile
          echo "    && rm -rf /var/lib/apt/lists/*" >> openclaw-image/Dockerfile
          echo "" >> openclaw-image/Dockerfile
          echo "# 安装 OpenClaw" >> openclaw-image/Dockerfile
          echo "RUN npm install -g openclaw" >> openclaw-image/Dockerfile
          echo "" >> openclaw-image/Dockerfile
          echo "# 设置入口点" >> openclaw-image/Dockerfile
          echo 'ENTRYPOINT ["openclaw"]' >> openclaw-image/Dockerfile
          echo 'CMD ["--help"]' >> openclaw-image/Dockerfile
          
          echo "Dockerfile created:"
          cat openclaw-image/Dockerfile
      
      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image 'openclaw:latest'..."
          docker build -t openclaw:latest ./openclaw-image
          docker images | grep openclaw
      
      - name: Test OpenClaw in Docker container
        run: |
          echo "🧪 Testing OpenClaw in container..."
          docker run --rm openclaw:latest --version || echo "Version check completed"
      
      - name: Save image to compressed tarball
        run: |
          echo "💾 Saving Docker image to openclaw-image.tar.gz..."
          docker save openclaw:latest | gzip > openclaw-image.tar.gz
          ls -lh openclaw-image.tar.gz
      
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-docker-image
          path: openclaw-image.tar.gz
          retention-days: 7
      
      - run: echo "🍏 This job's status is ${{ job.status }}. The OpenClaw image is ready as an artifact."
