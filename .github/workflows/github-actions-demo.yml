name: OpenClaw Image Builder
run-name: ${{ github.actor }} is building OpenClaw image 🐙
on: [push]
jobs:
  Build-OpenClaw-Image:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."
      
      - name: Check out repository code
        uses: actions/checkout@v5
      
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🖥️ The workflow is now ready to install OpenClaw and build the image."
      
      - name: Install OpenClaw via official script (non-interactive)
        run: |
          echo "⬇️ Installing OpenClaw using official script..."
          # 设置环境变量避免交互式提示
          export CI=true
          export DEBIAN_FRONTEND=noninteractive
          curl -fsSL https://openclaw.ai/install.sh | bash
          echo "✅ OpenClaw installation completed"
      
      - name: Add OpenClaw to PATH
        run: |
          # 添加 npm global bin 目录到 PATH
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.npm-global/bin:$HOME/.local/bin:$PATH"
          echo "PATH updated"
      
      - name: Verify OpenClaw installation
        run: |
          export PATH="$HOME/.npm-global/bin:$HOME/.local/bin:$PATH"
          echo "Looking for openclaw..."
          which openclaw || echo "Not in PATH"
          ls -la ~/.npm-global/bin/ 2>/dev/null || echo "~/.npm-global/bin not found"
          ls -la ~/.local/bin/ 2>/dev/null || echo "~/.local/bin not found"
          
          # 尝试直接运行
          if command -v openclaw &> /dev/null; then
            openclaw --version
          else
            echo "⚠️ openclaw command not found, checking npm global packages..."
            npm list -g --depth=0 | grep -i claw || echo "Not found in npm global list"
          fi
      
      - name: Prepare Docker image context
        run: |
          echo "📁 Creating Docker image context with OpenClaw environment..."
          mkdir -p openclaw-image/usr/local/bin
          
          # 尝试多个可能的位置复制 OpenClaw
          export PATH="$HOME/.npm-global/bin:$HOME/.local/bin:$PATH"
          
          OPENCLAW_FOUND=""
          if [ -f "$HOME/.npm-global/bin/openclaw" ]; then
            cp "$HOME/.npm-global/bin/openclaw" openclaw-image/usr/local/bin/
            OPENCLAW_FOUND="yes"
            echo "✅ Copied openclaw from ~/.npm-global/bin"
          elif [ -f "$HOME/.local/bin/openclaw" ]; then
            cp "$HOME/.local/bin/openclaw" openclaw-image/usr/local/bin/
            OPENCLAW_FOUND="yes"
            echo "✅ Copied openclaw from ~/.local/bin"
          elif command -v openclaw &> /dev/null; then
            cp "$(which openclaw)" openclaw-image/usr/local/bin/
            OPENCLAW_FOUND="yes"
            echo "✅ Copied openclaw from $(which openclaw)"
          fi
          
          # 即使二进制文件未找到，也继续创建 Dockerfile
          # Docker 镜像将在运行时通过 npm 安装 OpenClaw
          
          # 创建 Dockerfile - 在容器内安装 OpenClaw
          cat > openclaw-image/Dockerfile << 'EOF'
            FROM node:22-slim
            RUN apt-get update && apt-get install -y --no-install-recommends \
                ca-certificates \
                git \
                curl \
                && rm -rf /var/lib/apt/lists/*
            # 在容器内安装 OpenClaw
            RUN npm install -g openclaw
            ENTRYPOINT ["openclaw"]
            CMD ["--help"]
            EOF
      
      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image 'openclaw:latest'..."
          docker build -t openclaw:latest ./openclaw-image
          docker images | grep openclaw
      
      - name: Save image to compressed tarball
        run: |
          echo "💾 Saving Docker image to openclaw-image.tar.gz..."
          docker save openclaw:latest | gzip > openclaw-image.tar.gz
          ls -lh openclaw-image.tar.gz
      
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-docker-image
          path: openclaw-image.tar.gz
          retention-days: 7
      
      - run: echo "🍏 This job's status is ${{ job.status }}. The OpenClaw image is ready as an artifact."
